[[extend 'layout.html']]

<div class="section">
   <h1 class="title">Your Checklists</h1>

   <a class="button is-success" href="[[=URL('add')]]">
      <span class="icon"><i class="fa fa-plus"></i></span>
      <span>Add Checklist</span>
   </a>

   <table class="table is-fullwidth is-striped">
      [[for c in checklists:]]
      <tr><td>
         [[=c.checklist_name]]
      </td></tr>
      [[pass]]
   </table>

</div>
